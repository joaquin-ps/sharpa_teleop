# @package hand_config
#
# MIXED-IK mode (7-DOF Ditto leader, current mode):
#   - INDEX  (121/122/123): POSITION via retargeting (IK), but FORCE rendered from
#     the *measured* Sharpa joint current (joint_teleop-style), NOT tactile/estimate.
#   - THUMB  (111/112/113/114): retargeting (IK) + TACTILE force rendering.
#
# Same as ditto_hand_mixed.yaml except the index is driven in Cartesian space (IK)
# instead of a direct joint map; only its force feedback uses the measured joint
# current. The index control.joint_map is still required so the measured Sharpa
# joint torque can be mapped back to the leader joints (its `scale` only sets the
# rendered-force sign here, since position comes from IK).
#
# Index current_control mirrors joint_teleop/sharpa_3dof_index (measured-torque
# scale); thumb mirrors ditto_thumb_tactile.

control_frequency: 200
verbose: true
show_current_breakdown: false

leader:
  mode: current
  motor_ids: [121, 122, 123, 111, 112, 113, 114]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:

  # < ----- INDEX (IK position, measured-current force) ----- >
  - motor_id: 121            # index_joint_0 -> Index MCP AA
    plot_joint: true  
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 70.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.1
      force_rendering_alpha: 0.05
      force_rendering_threshold_positive: 350
      force_rendering_threshold_negative: 350
      force_rendering_max_current: 50
      command_rate_limit_mA_per_s: 500.0
  - motor_id: 122            # index_joint_1 -> Index MCP FE
    plot_joint: true    
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 60.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.12
      force_rendering_alpha: 0.05
      force_rendering_threshold_positive: 135
      force_rendering_threshold_negative: 185
      force_rendering_max_current: 110
      command_rate_limit_mA_per_s: 500.0
  - motor_id: 123            # index_joint_2 -> Index PIP
    plot_joint: true    
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 60.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 45
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.18
      force_rendering_alpha: 0.05
      force_rendering_threshold_positive: 125
      force_rendering_threshold_negative: 185
      force_rendering_max_current: 90
      command_rate_limit_mA_per_s: 500.0

  # < ----- THUMB (IK position, tactile force) ----- >
  - motor_id: 111            # thumb_joint_0 (proximal) 
    plot_joint: false  
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 100
  - motor_id: 112            # thumb_joint_1
    plot_joint: false 
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 25.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110
  - motor_id: 113            # thumb_joint_2
    plot_joint: false     
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 25.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110
  - motor_id: 114            # thumb_joint_3 (distal) 
    plot_joint: false   
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 70

follower:
  mode: none

# Per-finger control mode (the single source of truth for what each finger does):
#   position: retarget (IK) | joint (direct leader→Sharpa joint map)
#   force:    measured (Sharpa joint current) | estimate | tactile | mix
# This config: index is IK position but force comes from the measured Sharpa
# joint current (joint_teleop-style); thumb is IK + tactile. Measured-force
# fingers still need a control.joint_map (Sharpa joint -> leader joint; the
# scale sign sets the rendered-force direction).
control:
  fingers:
    index: {position: retarget, force: measured}
    thumb: {position: retarget, force: tactile}
  joint_map:
    index:
    # position is IK here, so scale only sets the rendered-force sign
    # τ_ditto = scale·τ_sharpa. +1 for ditto_3f_leader (+Z index axes).
    - {ditto_joint: index_joint_0, sharpa_joint: right_index_MCP_AA, scale: 1.0}
    - {ditto_joint: index_joint_1, sharpa_joint: right_index_MCP_FE, scale: 1.0}
    - {ditto_joint: index_joint_2, sharpa_joint: right_index_PIP, scale: 1.0}

# Per-motor force-rendering tuning: joint torque (Nm) → synthetic current (mA).
# The torque is the measured Sharpa joint current (index) or the tactile Jᵀ
# estimate (thumb), per control.fingers above.
force_render:
  joints:
  - motor_id: 121
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 122
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 123
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 111
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 112
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 113
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 114
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
