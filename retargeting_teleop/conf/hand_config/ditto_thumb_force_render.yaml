# @package hand_config
#
# Ditto thumb leader in CURRENT mode for retargeting force rendering.
# Motors 111/112/113/114 == DITTO thumb_joint_0/1/2/3.
#
# No prior tuned thumb config exists, so these are educated guesses started at
# LOW gain for safety (same XC330 motors and Jᵀ pipeline as the index). The
# render direction sign is shared with the index (FORCE_RENDER_FEEDBACK_SIGN),
# so if the index felt correct the thumb should too. Bump force_rendering_gain
# (and torque_to_mA / damping) up gradually while watching viz/force_plot.py.
#
# Low-pass filters are off (force_rendering_alpha = torque_filter_alpha = 1).

control_frequency: 200
verbose: true
show_current_breakdown: false

leader:
  mode: current
  motor_ids: [111, 112, 113, 114]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:
  - motor_id: 111            # thumb_joint_0 (proximal / CMC-like): heaviest, gentlest
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 50.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.05

      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 1000
      force_rendering_max_current: 110
  - motor_id: 112            # thumb_joint_1
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 60.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.1
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 400
      force_rendering_threshold_negative: 3000
      force_rendering_max_current: 110
  - motor_id: 113            # thumb_joint_2
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 0.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: false
      gradual_rendering: true
      force_rendering_gain: 0.05
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 2000
      force_rendering_max_current: 80
  - motor_id: 114            # thumb_joint_3 (distal / IP-like): lightest deadband
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 15.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: false
      gradual_rendering: true
      force_rendering_gain: 0.05
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 1500
      force_rendering_max_current: 70

follower:
  mode: none

# Per-finger control mode (the single source of truth for what each finger does):
#   position: retarget (IK) | joint (direct leader→Sharpa joint map)
#   force:    measured (Sharpa joint current) | estimate | tactile | mix
# This config: thumb driven by IK, force from the model-based Jᵀ estimate (see
# ditto_thumb_tactile for the tactile variant).
control:
  fingers:
    thumb: {position: retarget, force: estimate}

# Per-motor force-rendering tuning: joint torque (Nm) → synthetic current (mA).
# torque_filter_alpha is an EMA on the torque (1.0 = no filter).
force_render:
  joints:
  - motor_id: 111
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25    
  - motor_id: 112
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 113
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 114
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
