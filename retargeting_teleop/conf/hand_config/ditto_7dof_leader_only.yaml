# @package hand_config
#
# Ditto 7-DoF leader only: read encoders, no follower, no force feedback.
# Motor order matches retargeting DITTO_LEADER_JOINT_NAMES:
#   index: 21, 22, 23  |  thumb: 11, 12, 13, 14

control_frequency: 200

leader:
  mode: torque_off
  motor_ids: [21, 22, 23, 11, 12, 13, 14]
  general_settings: {}
  joint_settings:
  - motor_id: 21
    joint_settings:
      motor_model: XC330
  - motor_id: 22
    joint_settings:
      motor_model: XC330
  - motor_id: 23
    joint_settings:
      motor_model: XC330
  - motor_id: 11
    joint_settings:
      motor_model: XC330
  - motor_id: 12
    joint_settings:
      motor_model: XC330
  - motor_id: 13
    joint_settings:
      motor_model: XC330
  - motor_id: 14
    joint_settings:
      motor_model: XC330

follower:
  mode: none
