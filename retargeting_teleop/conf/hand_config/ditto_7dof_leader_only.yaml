# @package hand_config
#
# Ditto 7-DoF leader only: read encoders, no follower, no force feedback.
# Motor order matches retargeting DITTO_LEADER_JOINT_NAMES:
#   index: 121, 122, 123  |  thumb: 111, 112, 113, 114

control_frequency: 200

leader:
  mode: torque_off
  motor_ids: [121, 122, 123, 111, 112, 113, 114]
  general_settings: {}
  joint_settings:
  - motor_id: 121
    joint_settings:
      motor_model: XC330
  - motor_id: 122
    joint_settings:
      motor_model: XC330
  - motor_id: 123
    joint_settings:
      motor_model: XC330
  - motor_id: 111
    joint_settings:
      motor_model: XC330
  - motor_id: 112
    joint_settings:
      motor_model: XC330
  - motor_id: 113
    joint_settings:
      motor_model: XC330
  - motor_id: 114
    joint_settings:
      motor_model: XC330

follower:
  mode: none
