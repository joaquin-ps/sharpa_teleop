# @package hand_config
#
# Full 7-DOF Ditto hand (index + thumb) leader in CURRENT mode, force rendered
# from the Sharpa fingertip TACTILE sensors. Motors:
#   index: 121/122/123     == index_joint_0/1/2 (MCP AA, MCP flex, PIP)
#   thumb: 111/112/113/114 == thumb_joint_0/1/2/3
# Order matches DITTO_LEADER_MOTOR_IDS (index first, then thumb).
#
# Per-joint values mirror ditto_index_tactile + ditto_thumb_tactile; tune them
# there first, then keep this combined config in sync.

control_frequency: 200
verbose: true
show_current_breakdown: false

leader:
  mode: current
  motor_ids: [121, 122, 123, 111, 112, 113, 114]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:

  # < ----- INDEX (tactile) ----- >

  # Index MCP AA
  - motor_id: 121
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 90

  # Index MCP flex
  - motor_id: 122
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 25.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 125

  # Index PIP
  - motor_id: 123
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110

  # < ----- THUMB (tactile) ----- >
  
  # Thumb joint 0 (proximal / CMC-like): heaviest, gentlest
  - motor_id: 111
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 100

  # Thumb joint 1
  - motor_id: 112
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 25.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110

  # Thumb joint 2
  - motor_id: 113
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 25.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110

  # Thumb joint 3 (distal / IP-like): lightest deadband
  - motor_id: 114
    plot_joint: true   # plotting tools (force_plot.py) skip joints set false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 20.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      force_rendering_alpha: 0.1  
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 70

follower:
  mode: none

# Per-finger control mode (the single source of truth for what each finger does):
#   position: retarget (IK) | joint (direct leader→Sharpa joint map)
#   force:    measured (Sharpa joint current) | estimate | tactile | mix
# This config: both fingers driven by IK, force from the fingertip tactile F6.
control:
  fingers:
    index: {position: retarget, force: tactile}
    thumb: {position: retarget, force: tactile}

# Per-motor force-rendering tuning: joint torque (Nm) → synthetic current (mA).
# Tune torque_to_mA / torque_filter_alpha to the sensor scale/noise.
force_render:
  joints:
  - motor_id: 121
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 122
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 123
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 111
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 112
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 113
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
  - motor_id: 114
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.1
