# @package hand_config
#
# 7-DoF Ditto leader (index + thumb) with tactile force feedback and asymmetric
# command-side rate limiting. Tuning matches ditto_3f_tactile_rate for index and
# thumb joints.
#
# Adaptive gain (per joint): K_eff = K0 / (1 + c * |qdot|) softens contact onset
# while keeping full stiffness when still. Tune c via
# force_rendering_adaptive_velocity_coeff (start ~1.5–2.0).
#
# command_rate_limit_mA_per_s lives in current_control (per joint).
#
# Motors: index 121/122/123 | thumb 111/112/113/114 (DITTO_LEADER_MOTOR_IDS order).

control_frequency: 200
verbose: true
show_current_breakdown: false
show_perf: false

leader:
  mode: current
  sync_read_mode: pos_vel
  motor_ids: [121, 122, 123, 111, 112, 113, 114]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:

  # < ----- INDEX (tactile) ----- >

  - motor_id: 121
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 80
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 122
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 55
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 140
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 123
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 50
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 120
      command_rate_limit_mA_per_s: 500.0

  # < ----- THUMB (tactile) ----- >

  - motor_id: 111
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 130
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 112
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 120
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 113
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 80
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 114
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 70
      command_rate_limit_mA_per_s: 500.0

follower:
  mode: none

control:
  fingers:
    index: {position: retarget, force: tactile}
    thumb:  {position: retarget, force: tactile}

force_render:
  joints:
  - motor_id: 121
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 122
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 123
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 111
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 112
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 113
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 114
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
