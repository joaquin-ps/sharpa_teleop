# @package hand_config
#
# 3-finger Ditto (index + middle + thumb) with blended force sources.
# Extends ditto_hand_mixed_sources_rate.yaml; middle uses softer measured blend.
#
#   index / middle: 50% tactile + 50% measured Sharpa joint current
#   thumb:          65% tactile + 35% Jᵀ estimate (estimate noisier in 3f IK)
#
# Motors: index 121–123 | middle 131–133 | thumb 111–114 (DITTO_3F_LEADER_MOTOR_IDS).

control_frequency: 200
verbose: true
show_current_breakdown: false
show_perf: false

leader:
  mode: current
  sync_read_mode: pos_vel
  motor_ids: [121, 122, 123, 131, 132, 133, 111, 112, 113, 114]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:

  # < ----- INDEX (tactile + measured) ----- >

  - motor_id: 121
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 80
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 122
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 40.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 55
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 140
      command_rate_limit_mA_per_s: 500.0

  - motor_id: 123
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 60.0
      force_rendering_damping_velocity_threshold: 1.0
      force_rendering_damping_max_current: 50
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.4
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 2.0
      force_rendering_alpha: 0.3
      force_rendering_threshold_positive: 15
      force_rendering_threshold_negative: 15
      force_rendering_max_current: 120
      command_rate_limit_mA_per_s: 500.0

  # < ----- MIDDLE (tactile + measured — softer than index; measured is noisier) ----- >

  - motor_id: 131
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 70.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.1
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 80
      force_rendering_threshold_negative: 80
      force_rendering_max_current: 50
      command_rate_limit_mA_per_s: 250.0

  - motor_id: 132
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 70.0
      force_rendering_damping_velocity_threshold: 0.3
      force_rendering_damping_max_current: 45
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.12
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 60
      force_rendering_threshold_negative: 80
      force_rendering_max_current: 90
      command_rate_limit_mA_per_s: 250.0

  - motor_id: 133
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 60.0
      force_rendering_damping_velocity_threshold: 1.0
      force_rendering_damping_max_current: 45
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.1
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.1
      force_rendering_threshold_positive: 60
      force_rendering_threshold_negative: 80
      force_rendering_max_current: 110
      command_rate_limit_mA_per_s: 250.0

  # < ----- THUMB (tactile + estimate — softer blend for 3f stability) ----- >

  - motor_id: 111
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 50.0
      force_rendering_damping_velocity_threshold: 0.25
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.3
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.15
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 1000
      force_rendering_max_current: 140
      command_rate_limit_mA_per_s: 300.0

  - motor_id: 112
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 50.0
      force_rendering_damping_velocity_threshold: 0.25
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.35
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.15
      force_rendering_threshold_positive: 400
      force_rendering_threshold_negative: 3000
      force_rendering_max_current: 100
      command_rate_limit_mA_per_s: 300.0

  - motor_id: 113
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 45.0
      force_rendering_damping_velocity_threshold: 0.25
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.15
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 2000
      force_rendering_max_current: 70
      command_rate_limit_mA_per_s: 300.0

  - motor_id: 114
    plot_joint: false
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 45.0
      force_rendering_damping_velocity_threshold: 0.25
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.15
      enable_force_rendering_adaptive_gain: true
      force_rendering_adaptive_velocity_coeff: 3.0
      force_rendering_alpha: 0.15
      force_rendering_threshold_positive: 500
      force_rendering_threshold_negative: 1500
      force_rendering_max_current: 65
      command_rate_limit_mA_per_s: 300.0

follower:
  mode: none

control:
  fingers:
    index:
      position: retarget
      force:
        tactile: 0.6
        measured: 0.4
    middle:
      position: retarget
      force:
        tactile: 0.65
        measured: 0.35
    thumb:
      position: retarget
      force:
        tactile: 0.65
        estimate: 0.35
  joint_map:
    index:
    - {ditto_joint: index_joint_0, sharpa_joint: right_index_MCP_AA, scale: 1.0}
    - {ditto_joint: index_joint_1, sharpa_joint: right_index_MCP_FE, scale: 1.0}
    - {ditto_joint: index_joint_2, sharpa_joint: right_index_PIP, scale: 1.0}
    middle:
    - {ditto_joint: middle_joint_0, sharpa_joint: right_middle_MCP_AA, scale: 1.0}
    - {ditto_joint: middle_joint_1, sharpa_joint: right_middle_MCP_FE, scale: 1.0}
    - {ditto_joint: middle_joint_2, sharpa_joint: right_middle_PIP, scale: 1.0}

force_render:
  modality_filters:
    tactile:
      torque_filter_alpha: 0.25
    measured:
      torque_filter_alpha: 0.08
    estimate:
      torque_filter_alpha: 0.12
  joints:
  - motor_id: 121
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
  - motor_id: 122
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
  - motor_id: 123
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
  - motor_id: 131
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      measured:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 132
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      measured:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 133
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      measured:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 111
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      estimate:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 112
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      estimate:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 113
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      estimate:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
  - motor_id: 114
    torque_to_mA: 1000.0
    torque_filter_alpha: 1.0
    modality_filters:
      estimate:
        torque_filter_alpha: 0.08
      tactile:
        torque_filter_alpha: 0.25
