# @package sharpa

serial: null
# Index + thumb joints driven by retargeting (Sharpa SDK joint names).
enabled_joints:
  - "Index MCP Flexion/Extension"
  - "Index MCP Abduction/Adduction"
  - "Index PIP Flexion/Extension"
  - "Index DIP Flexion/Extension"
  - "Thumb CMC Flexion/Extension"
  - "Thumb CMC Abduction/Adduction"
  - "Thumb MCP Flexion/Extension"
  - "Thumb MCP Abduction/Adduction"
  - "Thumb DIP Flexion/Extension"
speed_coeff: 0.4
current_coeff: 0.6
discovery_timeout_s: 10.0
io_frequency_hz: 400.0

# Override the SDK position-clamp limits (degrees), keyed by SDK joint name.
# The follower applies these at startup to widen ROM without editing the
# sharpa_controller submodule. SDK defaults (thumb): CMC_FE 0-50, CMC_AA 0-10,
# MCP_FE 0-30, MCP_AA 0-10, DIP 0-40. WARNING: only widen within the hand's
# safe mechanical range. Set to {} to keep SDK defaults.
angle_overrides_deg:
  "Thumb CMC Flexion/Extension": [-5, 105] # (0, 80)
  "Thumb CMC Abduction/Adduction": [-18, 18] # (0, 20)
  "Thumb MCP Flexion/Extension": [-20, 60] # (0, 50)
  "Thumb MCP Abduction/Adduction": [-18, 18] # (0, 20)
  "Thumb DIP Flexion/Extension": [0, 90] # (0, 40)
