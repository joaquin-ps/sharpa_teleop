# @package hand_config
# Middle MCP AA (131) + MCP flex (132) + PIP (133) — direct joint map + measured force.
# Sharpa ROM widening for middle lives in conf/sharpa/default.yaml (angle_overrides_deg).

control_frequency: 200
verbose: true
show_current_breakdown: true

leader:
  mode: current
  motor_ids:
    - 131
    - 132
    - 133
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:
    - motor_id: 131
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: -20
        max_angle_deg: 20
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 80.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 40
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.12
        force_rendering_alpha: 0.1
        force_rendering_threshold_positive: 550
        force_rendering_threshold_negative: 550
        force_rendering_max_current: 80
    - motor_id: 132
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: -10
        max_angle_deg: 80
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 60.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 35
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.1
        force_rendering_alpha: 0.10
        force_rendering_threshold_positive: 135
        force_rendering_threshold_negative: 185
        force_rendering_max_current: 100
    - motor_id: 133
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: 0
        max_angle_deg: 80
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 60.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 30
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.22
        force_rendering_alpha: 0.1
        force_rendering_threshold_positive: 125
        force_rendering_threshold_negative: 145
        force_rendering_max_current: 100

follower:
  mode: none

control:
  fingers:
    middle: {position: joint, force: measured}
  joint_map:
    middle:
    - {ditto_joint: middle_joint_0, sharpa_joint: right_middle_MCP_AA, scale: 1.0}
    - {ditto_joint: middle_joint_1, sharpa_joint: right_middle_MCP_FE, scale: 1.0}
    - {ditto_joint: middle_joint_2, sharpa_joint: right_middle_PIP, scale: 1.0}

force_render:
  joints:
  - motor_id: 131
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 132
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 133
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
