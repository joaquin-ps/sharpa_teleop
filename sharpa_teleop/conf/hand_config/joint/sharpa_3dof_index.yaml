# @package hand_config
# Index MCP AA (121) + MCP flex (122) + PIP (123) — direct joint map + measured force.

control_frequency: 200
verbose: true
show_current_breakdown: true

leader:
  mode: current
  motor_ids:
    - 121
    - 122
    - 123
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:
    - motor_id: 121
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: -20
        max_angle_deg: 20
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 60.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 30
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.22
        force_rendering_alpha: 0.1
        force_rendering_threshold_positive: 350
        force_rendering_threshold_negative: 350
        force_rendering_max_current: 50
    - motor_id: 122
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: -10
        max_angle_deg: 80
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 60.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 35
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.15
        force_rendering_alpha: 0.10
        force_rendering_threshold_positive: 135
        force_rendering_threshold_negative: 185
        force_rendering_max_current: 110
    - motor_id: 123
      plot_joint: true
      joint_settings:
        motor_model: XC330
        zero_position: 2048
        min_angle_deg: 0
        max_angle_deg: 80
        direction: 1
      current_control:
        enable_force_rendering_damping: true
        force_rendering_damping_gain: 60.0
        force_rendering_damping_velocity_threshold: 0.0
        force_rendering_damping_max_current: 30
        enable_force_rendering: true
        gradual_rendering: true
        force_rendering_gain: 0.22
        force_rendering_alpha: 0.1
        force_rendering_threshold_positive: 125
        force_rendering_threshold_negative: 145
        force_rendering_max_current: 100

follower:
  mode: none

control:
  fingers:
    index: {position: joint, force: measured}
  joint_map:
    index:
    - {ditto_joint: index_joint_0, sharpa_joint: right_index_MCP_AA, scale: 1.0}
    - {ditto_joint: index_joint_1, sharpa_joint: right_index_MCP_FE, scale: 1.0}
    - {ditto_joint: index_joint_2, sharpa_joint: right_index_PIP, scale: 1.0}

force_render:
  joints:
  - motor_id: 121
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 122
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
  - motor_id: 123
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.25
