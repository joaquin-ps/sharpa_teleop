# @package hand_config
#
# Ditto middle finger leader in CURRENT mode, force rendered from the Sharpa
# middle fingertip TACTILE sensor. Motors 131/132/133 == middle_joint_0/1/2
# (MCP AA, MCP flex, PIP).
#
# Per-joint tuning mirrors ditto_index_tactile.yaml (same gains / torque_to_mA).

control_frequency: 200
verbose: true
show_current_breakdown: false
show_perf: false

leader:
  mode: current
  # pos_vel: hardware velocity for force-rendering damping without reading present current.
  sync_read_mode: pos_vel
  motor_ids: [131, 132, 133]
  general_settings:
    current_limit: 1400
    current_command: 0
  joint_settings:

  # Middle MCP AA
  - motor_id: 131
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 0.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      force_rendering_alpha: 0.2
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 80

  # Middle MCP flex
  - motor_id: 132
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 0.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 35
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.2
      force_rendering_alpha: 0.2
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110

  # Middle PIP
  - motor_id: 133
    plot_joint: true
    joint_settings:
      motor_model: XC330
    current_control:
      enable_force_rendering_damping: true
      force_rendering_damping_gain: 0.0
      force_rendering_damping_velocity_threshold: 0.0
      force_rendering_damping_max_current: 30
      enable_force_rendering: true
      gradual_rendering: true
      force_rendering_gain: 0.3
      force_rendering_alpha: 0.2
      force_rendering_threshold_positive: 0
      force_rendering_threshold_negative: 0
      force_rendering_max_current: 110

follower:
  mode: none

control:
  fingers:
    middle: {position: retarget, force: tactile}

force_render:
  joints:
  - motor_id: 131
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 132
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
  - motor_id: 133
    torque_to_mA: 1000.0
    torque_filter_alpha: 0.2
