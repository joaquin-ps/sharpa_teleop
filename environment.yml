name: sharpa_ditto
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - opencv
  - matplotlib
  - pinocchio>=3.3
  - pip
  - pip:
    - hydra-core>=1.3.0
    - omegaconf>=2.3.0
    - dynamixel-sdk==3.8.4
    - dynamixel_u2d2 @ git+https://github.com/joaquin-ps/dynamixel_u2d2.git
    # Kinematics (production retargeting core)
    - pin-pink>=3.1.0
    - scipy>=1.10.0
    # Dev-only visualization (optional at runtime)
    - viser>=0.2.23
    - yourdfpy>=0.0.58
    - trimesh>=4.0.0
